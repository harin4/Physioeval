global:
  scrape_interval:     15s
  evaluation_interval: 15s
  external_labels:
    monitor: 'physioeval'

scrape_configs:
  - job_name: 'physio-eval-api'
    static_configs:
      - targets: ['physio-api:8000']
    metrics_path: '/metrics'
    scrape_interval: 10s

  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']
